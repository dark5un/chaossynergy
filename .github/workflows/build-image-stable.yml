name: Chaossynergy build + push
on:
  push:
    branches: [chaos]
    paths-ignore: ["**.md"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Build container image
        run: |
          podman build \
            --build-arg BASE_TAG=stable \
            -t ghcr.io/${{ github.repository }}:stable \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            -f Containerfile .

      - name: Push image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push ghcr.io/${{ github.repository }}:stable
          podman push ghcr.io/${{ github.repository }}:${{ github.sha }}

  build-agent:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Podman
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq podman

      - name: Build agent container image
        run: |
          podman build \
            -t ghcr.io/${{ github.repository_owner }}/chaossynergy-agent:latest \
            -t ghcr.io/${{ github.repository_owner }}/chaossynergy-agent:${{ github.sha }} \
            -f chaos_files/agent-container/Containerfile .

      - name: Push agent image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push ghcr.io/${{ github.repository_owner }}/chaossynergy-agent:latest
          podman push ghcr.io/${{ github.repository_owner }}/chaossynergy-agent:${{ github.sha }}