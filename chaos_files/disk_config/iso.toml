# Chaossynergy — Interactive Anaconda ISO
#
# Branded installation ISO for Chaossynergy Agent OS.
# Booting this ISO launches the Anaconda installer with Chaossynergy
# product identity. The user picks disk, language, timezone, creates a
# user. After installation, the system boots into Chaossynergy.
#
# The bootc switch command tells the installer which container image
# to deploy. Anaconda handles partitioning, bootloader, and user
# creation automatically.

[customizations]
[customizations.iso]
volume_id = "CHAOSSYNERGY"
application_id = "Chaossynergy OS"
publisher = "dark5un"

[customizations.installer.kickstart]
contents = """
# Chaossynergy — post-install: switch to our custom image
# Anaconda automatically adds the ostreecontainer directive.
# We only need to customize post-install behavior here.
%post
bootc switch --mutate-in-place --transport registry ghcr.io/dark5un/chaossynergy:latest
%end
"""

[customizations.installer.modules]
enable = [
  "org.fedoraproject.Anaconda.Modules.Storage",
  "org.fedoraproject.Anaconda.Modules.Runtime",
  "org.fedoraproject.Anaconda.Modules.Network",
  "org.fedoraproject.Anaconda.Modules.Security",
  "org.fedoraproject.Anaconda.Modules.Services",
  "org.fedoraproject.Anaconda.Modules.Users",
  "org.fedoraproject.Anaconda.Modules.Timezone"
]

disable = [
  "org.fedoraproject.Anaconda.Modules.Subscription"
]