<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Chaossynergy Sigil — Alchemical Mark -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.3"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.15"/>

  <!-- Eight-pointed star -->
  <g>
    <line x1="100" y1="8" x2="100" y2="192" stroke="#a78bfa" stroke-width="0.6" opacity="0.25"/>
    <line x1="8" y1="100" x2="192" y2="100" stroke="#a78bfa" stroke-width="0.6" opacity="0.25"/>
    <line x1="35" y1="35" x2="165" y2="165" stroke="#a78bfa" stroke-width="0.4" opacity="0.15"/>
    <line x1="165" y1="35" x2="35" y2="165" stroke="#a78bfa" stroke-width="0.4" opacity="0.15"/>
  </g>

  <!-- Inner synergy ring -->
  <circle cx="100" cy="100" r="45" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.4" stroke-dasharray="4 8"/>
  <circle cx="100" cy="100" r="45" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.15"/>

  <!-- Core -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="url(#grad)" stroke-width="0.6" opacity="0.15"/>
  <circle cx="100" cy="100" r="3" fill="url(#grad)" opacity="0.6"/>

  <!-- Orbiting nodes -->
  <circle cx="100" cy="55" r="6" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
  <circle cx="100" cy="55" r="2" fill="#f59e0b" opacity="0.6"/>
  <circle cx="100" cy="145" r="6" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.2"/>
  <circle cx="100" cy="145" r="2" fill="#22d3ee" opacity="0.6"/>
  <circle cx="55" cy="100" r="6" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.2"/>
  <circle cx="55" cy="100" r="2" fill="#a78bfa" opacity="0.6"/>
  <circle cx="145" cy="100" r="6" fill="none" stroke="#f59e0b" stroke-width="0.5" opacity="0.2"/>
  <circle cx="145" cy="100" r="2" fill="#f59e0b" opacity="0.6"/>
</svg>